[build]
  publish = "."

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

[[redirects]]
  from = "/sounds/*"
  to = "/sounds/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
