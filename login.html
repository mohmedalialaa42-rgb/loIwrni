<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>تسجيل الدخول - BCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Cairo, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            padding: 1rem;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #111827;
            text-align: center;
            margin-bottom: .25rem;
        }
        p.sub {
            text-align: center;
            color: #6b7280;
            font-size: .875rem;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: .375rem;
        }
        input {
            width: 100%;
            padding: .75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color .2s;
        }
        input:focus { border-color: #16a34a; }
        button {
            width: 100%;
            padding: .75rem;
            background: #16a34a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #15803d; }
        button:disabled { background: #86efac; cursor: not-allowed; }
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>لوحة التحكم</h1>
        <p class="sub">BCare — تسجيل الدخول</p>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@example.com"/>
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"/>
            <button type="submit" id="submitBtn">تسجيل الدخول</button>
        </form>
    </div>
    <script>
        const API = "https://moaiendy.onrender.com/api-backend";
        const errorEl = document.getElementById("error");
        const form = document.getElementById("loginForm");
        const submitBtn = document.getElementById("submitBtn");

        if (localStorage.getItem("admin_token")) {
            window.location.href = "/";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.classList.remove("show");
            submitBtn.disabled = true;
            submitBtn.textContent = "جاري الدخول...";

            try {
                const res = await fetch(API + "/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || "فشل تسجيل الدخول");
                }

                if (data.token) {
                    localStorage.setItem("admin_token", data.token);
                    window.location.href = "/";
                } else {
                    throw new Error("لم يتم استلام رمز الدخول");
                }
            } catch (err) {
                errorEl.textContent = err.message || "تعذر الاتصال بالسيرفر. تأكد أن السيرفر الخلفي يعمل.";
                errorEl.classList.add("show");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "تسجيل الدخول";
            }
        });
    </script>
</body>
</html>
